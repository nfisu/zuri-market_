# Zuri Market — nginx configuration for SPA hosting
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint for Kubernetes liveness probe
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — any unknown route serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they have hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip for smaller transfers
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
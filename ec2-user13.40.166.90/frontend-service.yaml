# Zuri Market — Frontend Service
# Exposes the frontend pod inside the cluster.

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: zuri-market
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
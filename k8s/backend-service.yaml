# Zuri Market — Backend Service
# Stable internal address for the backend pods.

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: zuri-market
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
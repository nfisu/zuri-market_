# Zuri Market — Backend Deployment with init container for secrets
# Init container uses the EC2's IAM role to fetch the secret from AWS Secrets
# Manager before the backend starts. No CSI driver needed.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: zuri-market
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # ============================================
      # INIT CONTAINER: fetch secret from AWS
      # ============================================
      initContainers:
        - name: fetch-secrets
          image: amazon/aws-cli:2.17.0
          command:
            - sh
            - -c
            - |
              set -e
              echo "Fetching API_SECRET_KEY from AWS Secrets Manager..."
              aws secretsmanager get-secret-value \
                --region eu-west-2 \
                --secret-id zuri-market/backend \
                --query 'SecretString' \
                --output text \
                | sed -n 's/.*"API_SECRET_KEY":"\([^"]*\)".*/\1/p' \
                > /shared-secrets/API_SECRET_KEY
              echo "Done. Files written:"
              ls -la /shared-secrets/
          volumeMounts:
            - name: shared-secrets
              mountPath: /shared-secrets

      # ============================================
      # MAIN CONTAINER: backend
      # ============================================
      containers:
        - name: backend
          image: nfisu/zuri-market-backend:v1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          command:
            - sh
            - -c
            - |
              export API_SECRET_KEY=$(cat /shared-secrets/API_SECRET_KEY)
              exec node server.js
          env:
            - name: PORT
              value: "4000"
            - name: STORE_NAME
              value: "Zuri Market"
            - name: CURRENCY
              value: "GBP"
            - name: ALLOWED_ORIGINS
              value: "*"
          volumeMounts:
            - name: shared-secrets
              mountPath: /shared-secrets
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10

      # ============================================
      # SHARED VOLUME
      # ============================================
      volumes:
        - name: shared-secrets
          emptyDir:
            medium: Memory
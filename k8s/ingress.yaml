# Zuri Market — Ingress
# Routes public HTTP traffic to the right Service based on URL path.
# /api/* goes to backend, everything else to frontend.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zuri-market
  namespace: zuri-market
  labels:
    app: zuri-market
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
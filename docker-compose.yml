# Zuri Market — local orchestration
# One command starts the whole stack: `docker compose up -d`

services:
  # ============================================
  # Backend — Express API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: zuri-market-backend:latest
    container_name: zuri-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    networks:
      - zuri-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ============================================
  # Frontend — React + nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes this into the bundle at BUILD time, not runtime.
        # Use the service name 'backend' as hostname (Docker internal DNS).
        VITE_API_URL: http://localhost:4000
        VITE_STORE_NAME: Zuri Market
    image: zuri-market-frontend:latest
    container_name: zuri-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - zuri-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  zuri-net:
    driver: bridge